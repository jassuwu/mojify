version: 2

project_name: mojify

builds:
  - id: mojify
    main: ./packages/core/cmd/mojify
    binary: mojify
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - >-
        -s -w
        -X github.com/jass/mojify/packages/core/internal/cli.version={{ .Version }}
        -X github.com/jass/mojify/packages/core/internal/cli.commit={{ .Commit }}
        -X github.com/jass/mojify/packages/core/internal/cli.date={{ .Date }}

archives:
  - id: mojify
    ids:
      - mojify
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  disable: "{{ .IsSnapshot }}"
  use: github-native

release:
  github:
    owner: jassuwu
    name: mojify
  name_template: "{{ .ProjectName }} {{ .Tag }}"

brews:
  - name: mojify
    ids:
      - mojify
    repository:
      owner: jassuwu
      name: homebrew-tap
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    skip_upload: "{{ .IsSnapshot }}"
    homepage: https://github.com/jassuwu/mojify
    description: Terminal-first video playback with colored, edge-aware character frames.
    license: MIT
    dependencies:
      - name: ffmpeg
      - name: yt-dlp
    install: |
      bin.install "mojify"
    test: |
      system "#{bin}/mojify", "--version"
